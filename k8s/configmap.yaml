apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-service-config
  namespace: production
  labels:
    app: ml-service
    tier: ml
data:
  # Database Configuration
  DATABASE_URL: "postgresql://user:password@postgres-service:5432/pi_dev"
  
  # ML Configuration
  ML_MODEL_PATH: "/app/models/trained_models"
  MIN_DATA_POINTS: "5"
  CONFIDENCE_THRESHOLD: "0.6"
  PREDICTION_HORIZON_DAYS: "30"
  
  # API Configuration
  API_V1_PREFIX: "/api/v1"
  PROJECT_NAME: "ML Purchase Prediction Service"
  VERSION: "1.0.0"
  
  # CORS Origins
  CORS_ORIGINS: "http://localhost:5173,http://localhost:3001,http://frontend-service,http://backend-service:3001"
  
  # Logging
  LOG_LEVEL: "INFO"
  LOG_FILE: "/app/logs/ml-service.log"
