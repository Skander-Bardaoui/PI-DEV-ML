apiVersion: v1
kind: Secret
metadata:
  name: ml-service-secret
  namespace: production
  labels:
    app: ml-service
type: Opaque
stringData:
  # Database credentials (à remplacer par vos vraies valeurs)
  DB_USER: "mluser"
  DB_PASSWORD: "mlpassword"
  
  # API Keys (si nécessaire pour des services externes)
  # OPENAI_API_KEY: "your-api-key"
  # AWS_ACCESS_KEY: "your-aws-key"
