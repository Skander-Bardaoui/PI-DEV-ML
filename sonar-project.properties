# ═══════════════════════════════════════════════════════════════════════════
# SONARQUBE CONFIGURATION - ML SERVICE
# ═══════════════════════════════════════════════════════════════════════════

# Project Information
sonar.projectKey=ml-service
sonar.projectName=ML Service - PI DEV
sonar.projectVersion=1.0

# Source Code
sonar.sources=app
sonar.tests=tests
sonar.test.inclusions=**/test_*.py
sonar.exclusions=**/venv/**,**/__pycache__/**,**/logs/**,**/models/**,**/*.pyc

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/test_*.py,**/__init__.py,**/config.py

# Python Version
sonar.python.version=3.11

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
